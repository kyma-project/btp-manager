<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 510" width="660" height="510" role="img" aria-label="BTP Manager architecture">
  <title>BTP Manager Architecture</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>

  <!-- white background -->
  <rect width="660" height="510" fill="white"/>

  <!-- Kyma Cluster container: mild blue fill, no outline -->
  <rect x="20" y="20" width="620" height="470" rx="10" fill="#F0F6FF"/>
  <text x="330" y="50" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" fill="#000000">Kyma Cluster</text>

  <!-- BTP Manager -->
  <rect x="55" y="80" width="165" height="65" rx="4" fill="white" stroke="#666666" stroke-width="1"/>
  <text x="137" y="108" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#000000">BTP Manager</text>
  <text x="137" y="128" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#000000">(operator)</text>

  <!-- manages arrow -->
  <line x1="220" y1="112" x2="393" y2="112" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="306" y="104" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#000000">manages</text>

  <!-- SAP BTP Service Operator -->
  <rect x="395" y="80" width="210" height="65" rx="4" fill="white" stroke="#666666" stroke-width="1"/>
  <text x="500" y="108" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#000000">SAP BTP Service</text>
  <text x="500" y="128" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#000000">Operator</text>

  <!-- watches arrow -->
  <line x1="137" y1="145" x2="137" y2="238" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="148" y="197" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#000000">watches</text>

  <!-- provisions arrow -->
  <line x1="500" y1="145" x2="500" y2="238" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="511" y="197" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#000000">provisions</text>

  <!-- BtpOperator CR -->
  <rect x="55" y="240" width="165" height="65" rx="4" fill="white" stroke="#666666" stroke-width="1"/>
  <text x="137" y="268" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#000000">BtpOperator</text>
  <text x="137" y="288" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#000000">CR</text>

  <!-- ServiceInstance / ServiceBinding CRs -->
  <rect x="395" y="240" width="210" height="65" rx="4" fill="white" stroke="#666666" stroke-width="1"/>
  <text x="500" y="268" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#000000">ServiceInstance /</text>
  <text x="500" y="288" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#000000">ServiceBinding CRs</text>

  <!-- API calls arrow -->
  <line x1="500" y1="305" x2="500" y2="393" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="511" y="354" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#000000">API calls</text>

  <!-- SAP Service Manager -->
  <rect x="395" y="395" width="210" height="60" rx="4" fill="white" stroke="#666666" stroke-width="1"/>
  <text x="500" y="430" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#000000">SAP Service Manager</text>
</svg>
