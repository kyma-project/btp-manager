# permissions for end users to view btp-operator module resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyma-btp-operator-view
  labels:
    rbac.authorization.k8s.io/aggregate-to-view: "true"
rules:
- apiGroups:
  - operator.kyma-project.io
  resources:
  - btpoperators
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - operator.kyma-project.io
  resources:
  - btpoperators/status
  verbs:
  - get
- apiGroups:
  - services.cloud.sap.com
  resources:
  - serviceinstances
  - servicebindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - services.cloud.sap.com
  resources:
  - serviceinstances/status
  - servicebindings/status
  verbs:
  - get
