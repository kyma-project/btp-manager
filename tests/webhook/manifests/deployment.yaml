apiVersion: apps/v1
kind: Deployment
metadata:
  name: ca-bundle-webhook
  namespace: kyma-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ca-bundle-webhook
  template:
    metadata:
      labels:
        app: ca-bundle-webhook
    spec:
      serviceAccountName: ca-bundle-webhook
      containers:
        - name: webhook
          image: WEBHOOK_IMAGE
          ports:
            - containerPort: 8443
          env:
            - name: WATCH_NAMESPACE
              value: kyma-system
            - name: CA_BUNDLE_SECRET
              value: ca-bundle
          volumeMounts:
            - name: tls
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: ca-bundle-webhook-tls
