apiVersion: v1
kind: ServiceAccount
metadata:
  name: ca-bundle-webhook
  namespace: kyma-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ca-bundle-webhook
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ca-bundle-webhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ca-bundle-webhook
subjects:
  - kind: ServiceAccount
    name: ca-bundle-webhook
    namespace: kyma-system
