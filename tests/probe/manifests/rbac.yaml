apiVersion: v1
kind: ServiceAccount
metadata:
  name: ca-bundle-probe
  namespace: kyma-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ca-bundle-probe
rules:
  - apiGroups: ["operator.kyma-project.io"]
    resources: ["btpoperators"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ca-bundle-probe
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ca-bundle-probe
subjects:
  - kind: ServiceAccount
    name: ca-bundle-probe
    namespace: kyma-system
