name: Promote module version to channel
run-name: Promote ${{ inputs.releaseTag }} module version to ${{ inputs.channel }} channel
#  Workflow requires following variables to be defined
#     DOC_URL - location of btp-manager documentation
#     GIT_USER_NAME - user creating head branch and PR
#     GIT_USER_EMAIL - this user email
#     GH_TOOLS_HOST - tools host
#     IMAGE_REPO - name of binary image of the btp-manager executable
#     MODULE_MANIFESTS_REPO_NAME - repository of modules manifests

env:
  MODULE_MANIFESTS_WITH_USER: "https://${{ vars.GIT_USER_NAME }}:${{ secrets.BOT_TOKEN_GITHUB_TOOLS }}@${{ vars.GH_TOOLS_HOST }}/kyma/${{ vars.MODULE_MANIFESTS_REPO_NAME }}.git"
  BTP_MANAGER_RELEASES_URL: "https://github.com/kyma-project/btp-manager/releases"
  CHANNEL_MAPPING_FILENAME: module-releases.yaml

on:
  workflow_dispatch:
    inputs:
      releaseTag:
        description: "Release Tag"
        required: true
      channel:
        description: "Channel"
        type: choice
        options:
          - fast
          - regular
        required: true
        default: fast

jobs:
  promote:
    name: Promote to ${{ inputs.channel }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate required environment variables
        shell: bash
        run: |
          [ -z "${{ vars.DOC_URL }}" ] && echo "DOC_URL is required" && exit 1 
          [ -z "${{ vars.GIT_USER_EMAIL }}" ] && echo "GIT_USER_EMAIL is required" && exit 1 
          [ -z "${{ vars.GIT_USER_NAME }}" ] && echo "GIT_USER_NAME is required" && exit 1 
          [ -z "${{ vars.GH_TOOLS_HOST }}" ] && echo "GH_TOOLS_HOST is required" && exit 1 
          [ -z "${{ vars.IMAGE_REPO }}" ] && echo "IMAGE_REPO is required" && exit 1 
          [ -z "${{ vars.MODULE_MANIFESTS_REPO_NAME }}" ] && echo "MODULE_MANIFESTS_REPO_NAME is required" && exit 1 
          echo "Validated"

      - name: Checkout btp-manager
        uses: actions/checkout@v7
        with:
          path: btp-manager

      - name: Setup git and clone module-manifests
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN_GITHUB_TOOLS }}
        run: |
          git config --global user.email ${{ vars.GIT_USER_EMAIL }}
          git config --global user.name ${{ vars.GIT_USER_NAME }}
          git clone ${MODULE_MANIFESTS_WITH_USER}

      - name: Set branch name
        run: echo "BRANCH_NAME=btp-manager-${{ inputs.releaseTag }}-${{ inputs.channel }}" >> $GITHUB_ENV

      - name: Create branch
        working-directory: module-manifests
        run: |
          git checkout -B ${BRANCH_NAME}

      - name: Modify channel mapping
        env:
          TAG: ${{ inputs.releaseTag }}
          CHANNEL: ${{ inputs.channel }}
        run: ./btp-manager/scripts/update_channel_mapping.sh ./module-manifests/modules/btp-operator/${CHANNEL_MAPPING_FILENAME}

      - name: Commit and push changes
        working-directory: module-manifests
        run: |
          git add .
          git commit -m "Configuration files update"
          git remote set-url origin ${MODULE_MANIFESTS_WITH_USER}
          git push origin ${BRANCH_NAME}

      - name: Create PR if needed
        id: create_pr
        working-directory: module-manifests
        shell: bash
        env:
          GH_ENTERPRISE_TOKEN: ${{ secrets.BOT_TOKEN_GITHUB_TOOLS }}
          GH_HOST: ${{ vars.GH_TOOLS_HOST }}
          GH_PROMPT_DISABLED: true
          CHANNEL: ${{ inputs.channel }}
          TAG: ${{ inputs.releaseTag }}
          MODULE_MANIFESTS_REPO_URL: "https://${{ vars.GH_TOOLS_HOST }}/kyma/${{ vars.MODULE_MANIFESTS_REPO_NAME }}"
        run: |
          prs=$(gh pr list -R "${MODULE_MANIFESTS_REPO_URL}" -A ${{ vars.GIT_USER_NAME }} --state open --json headRefName | jq -r '.[] | .headRefName')

          if echo $prs | tr " " '\n' | grep -F -q -x ${BRANCH_NAME}; then
            echo "Opened PR already exists, no need to create new one, PR will be updated by push from previous step"
            PR_URL=$(gh pr list -R "${MODULE_MANIFESTS_REPO_URL}" --state open --json headRefName,url | jq -r --arg branch "${BRANCH_NAME}" '.[] | select(.headRefName == $branch) | .url')
          else
            PR_URL=$(printf '%s\nRisk is Low\n' "${BTP_MANAGER_RELEASES_URL}/${TAG}" \
              | gh pr create \
              -B main \
              -H ${BRANCH_NAME} \
              -R "${MODULE_MANIFESTS_REPO_URL}" \
              --title "Promote BTP Manager ${TAG} to ${CHANNEL} channel" \
              --fill \
              --body-file -)
            echo "${PR_URL}" | tee $GITHUB_STEP_SUMMARY
          fi

          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT

      - name: Comment on release-management issue
        shell: bash
        env:
          GH_ENTERPRISE_TOKEN: ${{ secrets.BOT_TOKEN_GITHUB_TOOLS }}
          GH_HOST: ${{ vars.GH_TOOLS_HOST }}
          GH_PROMPT_DISABLED: true
          TAG: ${{ inputs.releaseTag }}
          CHANNEL: ${{ inputs.channel }}
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
          RELEASE_MANAGEMENT_REPO_URL: "https://${{ vars.GH_TOOLS_HOST }}/kyma/release-management"
        run: |
          MAJOR=$(echo "${TAG}" | cut -d. -f1)
          MINOR=$(echo "${TAG}" | cut -d. -f2)
          PATCH=$(echo "${TAG}" | cut -d. -f3)

          if [ "${PATCH}" = "0" ]; then
            echo "New feature release ${TAG}, skipping release-management comment"
            exit 0
          fi

          if [ "${MINOR}" = "3" ]; then
            ISSUE_PATCH="1"
          else
            ISSUE_PATCH="0"
          fi

          ISSUE_TITLE="kyma-project.io/module/btp-operator v${MAJOR}.${MINOR}.${ISSUE_PATCH}"

          ISSUE_NUMBER=$(gh issue list -R "${RELEASE_MANAGEMENT_REPO_URL}" --state all --search "${ISSUE_TITLE}" --json number,title \
            | jq -r --arg title "${ISSUE_TITLE}" '.[] | select(.title == $title) | .number')

          if [ -z "${ISSUE_NUMBER}" ]; then
            echo "No issue found with title: ${ISSUE_TITLE}"
            exit 1
          fi

          COMMENT="Patch ${TAG} on ${CHANNEL} channel is approved here: ${PR_URL}"
          gh issue comment "${ISSUE_NUMBER}" -R "${RELEASE_MANAGEMENT_REPO_URL}" --body "${COMMENT}"
